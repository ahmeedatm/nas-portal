<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAS Portal</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

  <video id="bg-video" autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4">
  </video>

  <button id="ssh-btn" class="ssh-btn" title="SSH Terminal" aria-label="Ouvrir le terminal SSH">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polyline points="4 17 10 11 4 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="12" y1="19" x2="20" y2="19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <span>ssh</span>
  </button>

  <header>
    <svg class="house-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 12L12 3L21 12V21H15V15H9V21H3V12Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>NAS</h1>
    <span class="header-sub">Homelab</span>
  </header>

  <div id="service-grid" class="grid"></div>

  <div id="terminal-modal" class="terminal-modal" role="dialog" aria-modal="true" aria-label="SSH Terminal">
    <div class="terminal-modal-content">
      <div class="terminal-modal-header">
        <div class="terminal-modal-traffic">
          <span class="tm-dot tm-dot--red" id="terminal-close" title="Fermer"></span>
          <span class="tm-dot tm-dot--yellow"></span>
          <span class="tm-dot tm-dot--green"></span>
        </div>
        <span class="terminal-modal-title">root@nas — ssh</span>
        <div class="terminal-modal-traffic" style="visibility:hidden">
          <span class="tm-dot"></span><span class="tm-dot"></span><span class="tm-dot"></span>
        </div>
      </div>
      <iframe id="terminal-iframe" src="" title="SSH Terminal"></iframe>
    </div>
  </div>

  <script src="config.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
